name: bloc_onboarding
description: "A new Flutter project."
publish_to: 'none'
version: 2.0.1+21

environment:
  sdk: ">=3.2.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.0.1
  cupertino_icons: ^1.0.8
  geolocator: ^9.0.0
  country_code_picker: ^3.4.1
  geocoding: ^2.0.0
  shared_preferences: ^2.0.15
  flutter_google_places_sdk: ^0.4.2+1
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2
  otp_autofill: ^4.1.0
  fluttertoast: ^9.0.0
  http: ^1.5.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.0.4
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^17.2.1
  bloc: ^8.1.4
  flutter_localizations:
    sdk: flutter
  flutter_gen: ^5.4.0
  intl: ^0.20.2
  aws_s3_upload_lite: ^0.1.6     # ← replace with actual version from pub.dev
  mime: ^2.0.0
  path_provider: ^2.1.5
  provider: ^6.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  dotted_border: ^2.1.0
  flutter_svg: ^2.0.9
  file_picker: ^8.1.7
  mobile_scanner: ^7.2.0
  pin_code_fields: ^8.0.1
  webview_flutter: ^4.7.0
  connectivity_plus: ^6.0.3
  webview_flutter_android: ^3.16.1
  webview_flutter_wkwebview: ^3.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icons/
    - .env
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope/Manrope-Light.ttf
          weight: 300
        - asset: assets/fonts/Manrope/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope/Manrope-ExtraBold.ttf
          weight: 800

  generate: true
